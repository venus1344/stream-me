services:
  relay-rtmp:
    image: alfg/nginx-rtmp
    container_name: ome-relay-rtmp
    restart: unless-stopped
    ports:
      - "1936:1935"

  restream:
    build:
      context: ./restream
    container_name: ome-restream
    restart: unless-stopped
    depends_on:
      - relay-rtmp
      - ome
    network_mode: host
    env_file:
      - .env
    environment:
      RESTREAM_CONTROL_PORT: "8099"
    volumes:
      - ./restream/data:/data

  ome:
    # Force amd64 on Apple Silicon if the arm64 image aborts at startup.
    platform: linux/amd64
    image: airensoft/ovenmediaengine:latest
    container_name: ome
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "1935:1935"
      - "3333:3333"
      - "3478:3478/udp"
      - "3478:3478/tcp"
      - "10000:10000/tcp"
      - "10000-10010:10000-10010/udp"
    volumes:
      - ./conf/Server.xml:/opt/ovenmediaengine/bin/origin_conf/Server.xml:ro

  nginx:
    image: nginx:alpine
    container_name: ome-nginx
    restart: unless-stopped
    depends_on:
      - ome
      - restream
    network_mode: host
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./player:/usr/share/nginx/html:ro
